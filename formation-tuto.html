<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutoriel Formation — ESAT Alter Ego APAJH</title>
  <link rel="stylesheet" href="styles_bl.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="header-logo-mark">AE</div>
    <div>
      <div class="header-title">Formation</div>
      <div class="header-subtitle">Tutoriels</div>
    </div>
  </div>
  <div class="header-logo">
    <a href="index.html"><img src="logo-apajh.png" alt="Logo AP AJH" class="logo"></a>
  </div>
  <div class="header-actions">
    <a href="conditionnement.html" class="btn-ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Retour
    </a>
  </div>
</header>

<main>
  <section class="page-intro" style="text-align:center;margin-bottom:20px;">
    <h1>Tutoriels de Formation</h1>
    <p>Regardez les vidéos ci-dessous pour apprendre les différentes formations proposées.</p>
  </section>

  <div id="videosContainer" style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:0 20px;">
    <!-- Video iframes will be inserted here -->
  </div>
</main>

<script>
  function convertToYouTubeEmbed(url) {
    // Handle YouTube watch URLs
    const youtubeMatch = url.match(/^https?:\/\/(www\.)?youtube\.com\/watch\?v=([^&]+)/);
    if (youtubeMatch) {
      return `https://www.youtube.com/embed/${youtubeMatch[2]}`;
    }

    // Handle YouTube short URLs
    const youtuBeMatch = url.match(/^https?:\/\/(www\.)?youtu\.be\/([^?]+)/);
    if (youtuBeMatch) {
      return `https://www.youtube.com/embed/${youtuBeMatch[2]}`;
    }

    // Return original URL if not a YouTube URL
    return url;
  }

  const videos = JSON.parse(localStorage.getItem('videosFormation') || '[]');
  const container = document.getElementById('videosContainer');
  if(videos.length===0){
    container.innerHTML = '<p style="text-align:center;color:#777;">Aucune vidéo disponible pour le moment.</p>';
  } else {
    container.innerHTML = videos.map(v => `
      <div style="background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);width:320px;">
        <iframe width="320" height="180" src="${convertToYouTubeEmbed(v)}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    `).join('');
  }
</script>

</body>
</html>
