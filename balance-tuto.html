<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutoriel Balance de cuisine — ESAT Alter Ego APAJH</title>
  <link rel="stylesheet" href="styles_bl.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="header-logo-mark">AE</div>
    <div>
      <div class="header-title">Balance de cuisine</div>
      <div class="header-subtitle">Tutoriels</div>
    </div>
  </div>
  <div class="header-logo">
    <a href="index.html"><img src="logo-apajh.png" alt="Logo AP AJH" class="logo"></a>
  </div>
  <div class="header-actions">
    <a href="conditionnement.html" class="btn-ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Retour
    </a>
  </div>
</header>

<main>
  <section class="page-intro" style="text-align:center;margin-bottom:20px;">
    <h1>Tutoriels pour la Balance de cuisine</h1>
    <p>Regardez les vidéos ci-dessous pour apprendre à utiliser la balance.</p>
  </section>

  <div id="videosContainer" style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:0 20px;">
    <!-- Video iframes will be inserted here -->
  </div>
</main>

<script>
  function toEmbedUrl(url) {
    const watch  = url.match(/youtube\.com\/watch\?v=([^&]+)/);
    if (watch)  return `https://www.youtube-nocookie.com/embed/${watch[1]}?rel=0`;
    const shorts = url.match(/youtube\.com\/shorts\/([^?]+)/);
    if (shorts) return `https://www.youtube-nocookie.com/embed/${shorts[1]}?rel=0`;
    const short  = url.match(/youtu\.be\/([^?]+)/);
    if (short)  return `https://www.youtube-nocookie.com/embed/${short[1]}?rel=0`;
    return url;
  }

  async function loadAndRender() {
    const container = document.getElementById('videosContainer');
    container.innerHTML = '<p style="text-align:center;color:#777;">Chargement…</p>';

    const { data, error } = await supabaseClient
      .from('tutorial_videos')
      .select('url')
      .eq('category', 'balance')
      .order('created_at');

    if (error) {
      container.innerHTML = '<p style="text-align:center;color:red;">Erreur de chargement des vidéos.</p>';
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#777;">Aucune vidéo disponible pour le moment.</p>';
      return;
    }

    container.innerHTML = data.map(({ url }) => `
      <div style="background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);width:320px;">
        <iframe width="320" height="180" src="${toEmbedUrl(url)}"
          title="YouTube video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    `).join('');
  }

  loadAndRender();
</script>

</body>
</html>
